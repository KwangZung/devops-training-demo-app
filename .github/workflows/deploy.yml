name: Deploy Application

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to Staging
        run: echo "Gia lap thao tac deploy len moi truong staging khi code duoc day vao nhanh main..."

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Production
        run: echo "Gia lap thao tac deploy len moi truong production khi co tag phien ban moi..."